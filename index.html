<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ChromaLens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600&family=Satisfy&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --surface: #0f0f1a;
      --surface2: #14142000;
      --border: rgba(180, 100, 255, 0.15);
      --border-hover: rgba(180, 100, 255, 0.5);
      --accent: #b060ff;
      --accent2: #ff60b0;
      --text: #e8e4f4;
      --text-muted: #5a5570;
      --text-dim: #3a3550;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      height: 100vh;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* ── SCREENS ── */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 40px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── SCREEN 1: SPLASH ── */
    #s1 {
      background: radial-gradient(ellipse 80% 60% at 50% 40%, #1c0836 0%, var(--bg) 70%);
      gap: 0;
    }
    #s1::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(255, 60, 160, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(80, 30, 200, 0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    #splash-logo {
      width: min(75vw, 300px);
      height: min(75vw, 300px);
      object-fit: contain;
      animation: splashPulse 2s ease-in-out infinite alternate;
      position: relative;
      z-index: 1;
    }
    @keyframes splashPulse {
      from { filter: drop-shadow(0 0 20px rgba(180,80,255,0.4)) drop-shadow(0 0 60px rgba(255,60,160,0.2)); }
      to   { filter: drop-shadow(0 0 40px rgba(180,80,255,0.7)) drop-shadow(0 0 80px rgba(255,60,160,0.35)); }
    }
    .splash-bar {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }
    .splash-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .splash-dot:nth-child(2) { animation-delay: 0.2s; }
    .splash-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 100% { background: var(--text-dim); transform: scale(1); }
      50%       { background: var(--accent); transform: scale(1.4); }
    }

    /* ── SCREEN 2: PALETTE SELECTION ── */
    #s2 {
      justify-content: flex-start;
      padding-top: 52px;
      gap: 28px;
      overflow-y: auto;
    }
    .app-wordmark {
      text-align: center;
      line-height: 1;
    }
    .app-wordmark .chroma {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 300;
      font-size: 42px;
      letter-spacing: 8px;
      color: var(--text);
      text-transform: uppercase;
    }
    .app-wordmark .lens {
      font-family: 'Satisfy', cursive;
      font-size: 22px;
      color: var(--accent2);
      letter-spacing: 2px;
      display: block;
      margin-top: -4px;
    }
    .app-wordmark .tagline {
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 8px;
    }

    .palette-options { display: flex; flex-direction: column; gap: 14px; width: 100%; }

    .palette-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      cursor: pointer;
      background: var(--surface);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .palette-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(180,80,255,0.05), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .palette-card:hover::before, .palette-card.selected::before { opacity: 1; }
    .palette-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .palette-card.selected {
      border-color: var(--accent);
      background: rgba(180, 60, 255, 0.07);
    }
    .palette-card.selected::after {
      content: '✓';
      position: absolute;
      top: 14px; right: 16px;
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: white;
      font-weight: 600;
    }
    .palette-card h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 1px;
      margin-bottom: 3px;
    }
    .palette-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 0.5px; }
    .swatches { display: flex; flex-wrap: wrap; gap: 5px; }
    .swatch {
      width: 20px; height: 20px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 0.1s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch-more {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      padding: 0 4px;
    }

    .btn-main {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #7030d0, #b060ff);
      border: none;
      border-radius: 14px;
      color: white;
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-main:disabled { opacity: 0.3; cursor: default; transform: none; }
    .btn-main:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-main:not(:disabled):active { transform: scale(0.98); }
    .btn-ghost {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text-muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }

    /* ── SCREEN 3: SOURCE ── */
    #s3 { gap: 32px; }
    .screen-header { text-align: center; }
    .screen-header h2 {
      font-size: 24px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .screen-header p { font-size: 11px; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }

    .source-cards { display: flex; flex-direction: column; gap: 14px; width: 100%; }
    .source-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 26px 20px;
      cursor: pointer;
      background: var(--surface);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .source-card:hover {
      border-color: var(--border-hover);
      background: rgba(180, 60, 255, 0.05);
      transform: translateY(-2px);
    }
    .source-card:active { transform: scale(0.98); }
    .source-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: rgba(180, 60, 255, 0.1);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .source-card h3 { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: 1px; }
    .source-card p { font-size: 12px; color: var(--text-muted); }

    input[type="file"] { display: none; }

    /* ── SCREEN 4: ANALYZE ── */
    #s4 {
      justify-content: flex-start;
      padding: 16px 16px 24px;
      gap: 12px;
      overflow: hidden;
    }
    .s4-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      padding: 7px 14px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .back-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .palette-badge {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(180, 60, 255, 0.3);
      border-radius: 8px;
      padding: 4px 10px;
      background: rgba(180, 60, 255, 0.08);
    }
    .s4-logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 4px;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .tap-hint {
      font-size: 11px;
      letter-spacing: 2.5px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .canvas-wrap {
      width: 100%;
      flex: 1;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #0a0a12;
      position: relative;
      cursor: crosshair;
      min-height: 0;
    }
    #cv {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .crosshair {
      position: absolute;
      width: 24px; height: 24px;
      border: 2px solid rgba(255,255,255,0.85);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      display: none;
      box-shadow: 0 0 8px rgba(0,0,0,0.6);
    }
    .crosshair::before, .crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.7);
    }
    .crosshair::before { width: 1px; height: 8px; left: 50%; top: -10px; transform: translateX(-50%); }
    .crosshair::after  { height: 1px; width: 8px; top: 50%; left: -10px; transform: translateY(-50%); }

    .color-result {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .color-swatch-big {
      width: 60px; height: 60px;
      border-radius: 14px;
      background: #1a1a2e;
      border: 2px solid var(--border);
      flex-shrink: 0;
      transition: background 0.25s ease, border-color 0.25s;
    }
    .color-info { flex: 1; min-width: 0; }
    .color-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .color-hex {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: var(--accent);
      margin-top: 2px;
      letter-spacing: 1px;
    }
    .color-rgb {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">

  <!-- SCREEN 1: SPLASH -->
  <div id="s1" class="screen active">
    <img id="splash-logo" src="Logo.png" alt="CyberDigital Queens"
         onerror="this.style.opacity='0.3';this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><circle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%231a0836\'/><text x=\'50\' y=\'46\' text-anchor=\'middle\' fill=\'%23e0e0f0\' font-size=\'9\' font-family=\'sans-serif\'>CYBER</text><text x=\'50\' y=\'58\' text-anchor=\'middle\' fill=\'%23ff60b0\' font-size=\'9\' font-family=\'sans-serif\'>DIGITAL</text><text x=\'50\' y=\'70\' text-anchor=\'middle\' fill=\'%23e0e0f0\' font-size=\'9\' font-family=\'sans-serif\'>QUEENS</text></svg>'" />
    <div class="splash-bar">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>

  <!-- SCREEN 2: PALETTE SELECTION -->
  <div id="s2" class="screen">
    <div class="app-wordmark">
      <div class="chroma">Chroma</div>
      <span class="lens">Lens</span>
      <p class="tagline">Color Analyzer</p>
    </div>
    <div class="palette-options">
      <div class="palette-card" id="card-basic" onclick="selectPalette('basic')">
        <h3>Gama básica</h3>
        <p>16 colores esenciales CSS</p>
        <div class="swatches" id="sw-basic"></div>
      </div>
      <div class="palette-card" id="card-full" onclick="selectPalette('full')">
        <h3>Gama completa</h3>
        <p>+100 colores nombrados en español</p>
        <div class="swatches" id="sw-full"></div>
      </div>
    </div>
    <button class="btn-main" id="btn-continue" onclick="goTo(3)" disabled>Continuar</button>
  </div>

  <!-- SCREEN 3: SOURCE -->
  <div id="s3" class="screen">
    <div class="screen-header">
      <h2>Imagen</h2>
      <p>Selecciona una fuente</p>
    </div>
    <div class="source-cards">
      <div class="source-card" onclick="document.getElementById('cam-input').click()">
        <div class="source-icon">📷</div>
        <h3>Cámara</h3>
        <p>Tomar una foto nueva</p>
      </div>
      <div class="source-card" onclick="document.getElementById('file-input').click()">
        <div class="source-icon">🖼</div>
        <h3>Archivo guardado</h3>
        <p>Subir desde el dispositivo</p>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*"              onchange="loadImage(event)" />
    <input type="file" id="cam-input"  accept="image/*" capture="environment" onchange="loadImage(event)" />
    <button class="btn-ghost" onclick="goTo(2)">← Volver</button>
  </div>

  <!-- SCREEN 4: ANALYZE -->
  <div id="s4" class="screen">
    <div class="s4-header">
      <button class="back-btn" onclick="goTo(3)">← Volver</button>
      <span class="palette-badge" id="pal-badge">Básica</span>
      <span class="s4-logo">ChromaLens</span>
    </div>
    <div class="tap-hint">Toca la imagen para analizar</div>
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="cv"></canvas>
      <div class="crosshair" id="crosshair"></div>
    </div>
    <div class="color-result">
      <div class="color-swatch-big" id="result-box"></div>
      <div class="color-info">
        <div class="color-name" id="result-name">— Toca la imagen —</div>
        <div class="color-hex"  id="result-hex"></div>
        <div class="color-rgb"  id="result-rgb"></div>
      </div>
    </div>
  </div>

</div>

/* ── STATE ── */
let palette = null;
let imgNatW = 0, imgNatH = 0;
const cv  = document.getElementById('cv');
const ctx2d = cv.getContext('2d');

/* ── INIT ── */
window.addEventListener('load', () => {
  buildSwatches();
  setTimeout(() => goTo(2), 3000);
});

function buildSwatches() {
  const bEl = document.getElementById('sw-basic');
  BASIC.forEach(c => bEl.appendChild(mkSwatch(c)));

  const fEl = document.getElementById('sw-full');
  FULL.slice(0, 28).forEach(c => fEl.appendChild(mkSwatch(c)));
  const more = document.createElement('span');
  more.className = 'swatch-more';
  more.textContent = `+${FULL.length - 28}`;
  fEl.appendChild(more);
}

function mkSwatch(c) {
  const d = document.createElement('div');
  d.className = 'swatch';
  d.style.background = c.hex;
  d.title = c.name;
  return d;
}

/* ── NAVIGATION ── */
function goTo(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s' + n).classList.add('active');
}

/* ── PALETTE SELECTION ── */
function selectPalette(type) {
  palette = type;
  document.getElementById('card-basic').classList.toggle('selected', type === 'basic');
  document.getElementById('card-full').classList.toggle('selected', type === 'full');
  document.getElementById('btn-continue').disabled = false;
  document.getElementById('pal-badge').textContent = type === 'basic' ? '16 colores' : 'Completa';
}

/* ── IMAGE LOADING ── */
function loadImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      imgNatW = img.naturalWidth;
      imgNatH = img.naturalHeight;
      cv.width  = imgNatW;
      cv.height = imgNatH;
      ctx2d.drawImage(img, 0, 0);
      goTo(4);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

/* ── COLOR ANALYSIS ── */
function dist(a, b) {
  return Math.sqrt((a.r-b.r)**2 + (a.g-b.g)**2 + (a.b-b.b)**2);
}

function closestColor(r, g, b) {
  const pal = palette === 'basic' ? BASIC : FULL;
  return pal.reduce((best, c) => dist({r,g,b}, c) < dist({r,g,b}, best) ? c : best, pal[0]);
}

function handleTap(e) {
  e.preventDefault();
  const rect  = cv.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  const sx = (touch.clientX - rect.left) / rect.width;
  const sy = (touch.clientY - rect.top)  / rect.height;
  const px = Math.floor(sx * imgNatW);
  const py = Math.floor(sy * imgNatH);
  if (px < 0 || py < 0 || px >= imgNatW || py >= imgNatH) return;

  const [r,g,b] = ctx2d.getImageData(px, py, 1, 1).data;
  const match = closestColor(r, g, b);

  document.getElementById('result-box').style.background = match.hex;
  document.getElementById('result-box').style.borderColor = match.hex;
  document.getElementById('result-name').textContent = match.name;
  document.getElementById('result-hex').textContent  = match.hex.toUpperCase();
  document.getElementById('result-rgb').textContent  = `rgb(${r}, ${g}, ${b})`;

  const dot = document.getElementById('crosshair');
  dot.style.left = (sx * 100) + '%';
  dot.style.top  = (sy * 100) + '%';
  dot.style.display = 'block';
}

const wrap = document.getElementById('canvas-wrap');
wrap.addEventListener('click',      handleTap);
wrap.addEventListener('touchstart', handleTap, { passive: false });
</script>
